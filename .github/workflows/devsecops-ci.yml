name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # -------------------------------------------------------------
  # STAGE 1: Parallel Static Analysis & Security Scans
  # -------------------------------------------------------------
  sonar-sast-scan:
    name: SonarQube SAST Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Disable shallow clone for accurate SonarQube analytics

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dproject.settings=devops/security/sonar-project.properties

  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-fs-report.json'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy FS Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.json

  owasp-dependency-check:
    name: OWASP Dependency-Check Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check Scan
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'gocart'
          path: '.'
          format: 'HTML'
          out: 'reports'

      - name: Upload OWASP Dependency-Check Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports/

  # -------------------------------------------------------------
  # STAGE 2: Build & Push (Runs only if Stage 1 scans are clean/successful)
  # -------------------------------------------------------------
  docker-build-push:
    name: Docker Build & Registry Push
    needs: [sonar-sast-scan, trivy-fs-scan, owasp-dependency-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            prasadhire/gocart:${{ github.sha }}
            prasadhire/gocart:latest

  # -------------------------------------------------------------
  # STAGE 3: Parallel Post-Push Scans (Vulnerability & DAST)
  # -------------------------------------------------------------
  trivy-image-scan:
    name: Trivy Container Image Scan
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'prasadhire/gocart:${{ github.sha }}'
          scan-type: 'image'
          format: 'json'
          output: 'trivy-image-report.json'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy Image Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json

  owasp-zap-dast-scan:
    name: OWASP ZAP DAST Scan
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start Container for DAST Scan
        run: |
          docker run -d --name app-scan -p 3000:3000 prasadhire/gocart:latest
          # Wait for server startup
          sleep 10

      - name: Run OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          fail_action: false

      - name: Stop Container
        run: docker stop app-scan
