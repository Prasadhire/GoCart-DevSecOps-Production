apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gocart-netpol
  namespace: gocart
spec:
  podSelector:
    matchLabels:
      app: gocart-web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress strictly from the NGINX Ingress Controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow egress to kube-dns for domain queries
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow egress to the Postgres database port 5432 (e.g. AWS RDS or database subnets)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0 # Restrict this to database subnet CIDR block (e.g. 10.0.201.0/24) if needed
      ports:
        - protocol: TCP
          port: 5432
