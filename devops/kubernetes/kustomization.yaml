apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# List of all Kubernetes resources to include
resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - network-policy.yaml

# Declaring the image name and default tag.
# ArgoCD Image Updater will automatically update 'newTag' here when a new version is pushed!
images:
  - name: prasadhire/gocart
    newName: prasadhire/gocart
    newTag: v1.0.0
