apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2" # Runs in Wave 2 (after the base config)
data:
  # Gmail SMTP configuration
  service.email.email: |
    host: smtp.gmail.com
    port: 587
    from: hireprasad03@gmail.com
    username: hireprasad03@gmail.com
    password: $gmail-app-password

  # Sync status triggers
  trigger.on-sync-succeeded: |
    - when: app.status.sync.status == 'Synced'
      send: [sync-succeeded-email-template]

  trigger.on-sync-failed: |
    - when: app.status.sync.status == 'Failed'
      send: [sync-failed-email-template]

  # Message templates
  template.sync-succeeded-email-template: |
    email:
      subject: "🚀 ArgoCD: {{.app.metadata.name}} Synced Successfully!"
      body: |
        The ArgoCD application {{.app.metadata.name}} has been synced successfully.
        
        App Details:
        - Revision: {{.app.status.sync.revision}}
        - Sync Status: {{.app.status.sync.status}}
        - Target Server: {{.app.spec.destination.server}}

  template.sync-failed-email-template: |
    email:
      subject: "⚠️ ArgoCD: {{.app.metadata.name}} Sync Failed!"
      body: |
        The ArgoCD application {{.app.metadata.name}} sync has failed. Please check the logs.
        
        App Details:
        - Sync Status: {{.app.status.sync.status}}
        - Repository: {{.app.spec.source.repoURL}}
        - Error Details: {{.app.status.conditions}}
