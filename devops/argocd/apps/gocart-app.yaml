apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gocart-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    
    argocd-image-updater.argoproj.io/image-list: gocart-web=prasadhire/gocart
    argocd-image-updater.argoproj.io/gocart-web.update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-address: 'https://github.com/Prasadhire/GoCart-DevSecOps-Production.git'
    
    notifications.argoproj.io/subscribe.on-sync-succeeded.email: 'hireprasad03@gmail.com'
    notifications.argoproj.io/subscribe.on-sync-failed.email: 'hireprasad03@gmail.com'
spec:
  project: default
  source:
    repoURL: 'https://github.com/Prasadhire/GoCart-DevSecOps-Production.git' 
    targetRevision: main
    path: devops/kubernetes
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: gocart
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
